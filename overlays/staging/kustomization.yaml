apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- secret-store.yaml
- vault-token.yaml

namespace: deployment

images:
- name: localhost/backend
  newName: localhost:5001/backend
  newTag: 1.0.0
- name: localhost/frontend
  newName: localhost:5001/frontend
  newTag: 1.0.0

patches:
- path: patch-ingress.yaml
