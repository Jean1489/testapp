version: "3.9"

services:

  # ── Jenkins ──────────────────────────────────────────────────────────────────
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins-local
    restart: unless-stopped
    user: root                        # necesario para acceder al socket de Docker
    ports:
      - "8088:8080"                   # UI → http://localhost:8088
      - "50000:50000"                 # agentes JNLP (no se usa en local pero por si acaso)
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # Docker-in-Docker vía socket
      - ~/.kube:/root/.kube                     # kubeconfig del kind cluster
      - ~/.kube:/var/jenkins_home/.kube           # también accesible como jenkins home
    networks:
      - testapp-net

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    image: localhost/frontend:${FRONTEND_TAG:-local}
    container_name: testapp-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - testapp-net

  # ── Backend FastAPI ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    image: localhost/backend:${BACKEND_TAG:-local}
    container_name: testapp-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_VERSION:  ${BACKEND_TAG:-local}
      NAMESPACE:    ${NAMESPACE:-local}
      ENVIRONMENT:  ${ENVIRONMENT:-local}
      DB_HOST:      ${DB_HOST:-db.local.internal}
      SECRET_KEY:   ${SECRET_KEY:-local-secret-key}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - testapp-net

volumes:
  jenkins_home:

networks:
  testapp-net:
    driver: bridge
