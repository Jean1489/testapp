apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - external-secret.yaml
  - frontend/deployment.yaml
  - backend/deployment.yaml
  - backend/configmap.yaml
  - services.yaml
  - ingress.yaml

images:
  - name: localhost:5001/frontend
    newTag: local
  - name: localhost:5001/backend
    newTag: local
